<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunicação Interna - Grupo SR</title>
    <!-- Adicionado ?v=2 para forçar atualização do cache no celular -->
    <link rel="icon" href="favicon.ico?v=2" type="image/x-icon">
    <link rel="apple-touch-icon" href="favicon.ico?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Russo+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --verde-escuro: #10543A;
            --verde-fundo-logo: #e8f5e9; 
        }

       body {
    font-family: 'Montserrat', sans-serif;
    /* Substitua 'fundo.jpg' abaixo pela extensão real que o arquivo possui no seu computador */
    background-image: url('fundo.jpeg') !important; 
    background-repeat: repeat !important;
    background-position: center center !important;
    background-size: 200px !important;
    background-color: transparent !important;
    margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box;
}
        .form-container { background-color: #ffffff; width: 100%; max-width: 650px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); overflow: hidden; }
        .header-banner { background-color: var(--verde-fundo-logo); padding: 20px 15px; text-align: center; border-bottom: 4px solid var(--verde-escuro); }
        .header-banner img { max-width: 180px; height: auto; display: block; margin: 0 auto 10px auto; }
        .header-banner p { margin: 0; font-family: 'Russo One', sans-serif; font-size: 16px; color: var(--verde-escuro); letter-spacing: 1px; text-transform: uppercase; }
        .form-body { padding: 20px; }
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
        .form-group { margin-bottom: 0; position: relative; }
        .full-width { grid-column: span 2; }
        label { display: block; margin-bottom: 4px; font-weight: 600; color: #333333; font-size: 12px; }
        label span { color: #de350b; margin-left: 2px; }
        input[type="text"], input[type="number"], input[type="date"], select, textarea, input[type="file"] {
            width: 100%; padding: 8px 10px; border: 1px solid #cccccc; border-radius: 5px; box-sizing: border-box; font-size: 13px; font-family: 'Montserrat', sans-serif; background-color: #fafafa; transition: all 0.2s;
        }
        .btn-generator { background-color: var(--verde-escuro); color: white; border: none; padding: 0 12px; border-radius: 5px; cursor: pointer; font-weight: 600; font-size: 12px; transition: all 0.2s; white-space: nowrap; }
        .btn-submit { background-color: var(--verde-escuro); color: white; border: none; width: 100%; padding: 12px; border-radius: 5px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Russo One', sans-serif; letter-spacing: 1px; transition: background-color 0.2s; margin-top: 15px; }
        .loading { opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header-banner">
        <img src="Grupo SR.png" alt="Grupo SR">
        <p>Comunicação Interna</p>
    </div>
    
    <form id="ciForm" class="form-body" novalidate>
        <div class="form-grid">
            <div class="form-group full-width">
                <label>Nº Sequencial <span>*</span></label>
                <div class="number-generator-group" style="display: flex; gap: 8px;">
                    <input type="text" id="numeroCI" name="numeroCI" placeholder="Gere o número ao lado" readonly required>
                    <button type="button" id="btnGerar" class="btn-generator" onclick="gerarNumero()">Gerar Número CI</button>
                </div>
            </div>

            <!-- ... (seus campos de formulário permanecem iguais) ... -->
            <div class="form-group"><label>Ação da CI <span>*</span></label><select id="acao" name="acao" required><option value="" disabled selected>Escolha...</option><option value="Fabricação">Fabricação</option><option value="Requisição">Requisição</option><option value="Pintura">Pintura</option></select></div>
            <div class="form-group"><label>Responsável CI <span>*</span></label><select id="responsavel" name="responsavel" required><option value="" disabled selected>Escolha...</option><option value="Fernando Hendges Lopes">Fernando Hendges Lopes</option><option value="Marcos Malezan Tasquetto">Marcos Malezan Tasquetto</option><option value="Raphael Naeher">Raphael Naeher</option><option value="Ricardo Moreira">Ricardo Moreira</option><option value="Alan Renato Virago">Alan Renato Virago</option><option value="José Tomas">José Tomas</option><option value="Luis Filipe">Luis Filipe</option><option value="Eduardo Prado">Eduardo Prado</option><option value="Enrique Carvalho">Enrique Carvalho</option><option value="Henrique Moreira">Henrique Moreira</option><option value="Rafael Fagan">Rafael Fagan</option></select></div>
            <div class="form-group"><label>Destino da Comunicação <span>*</span></label><select id="destino" name="destino" required><option value="" disabled selected>Escolha...</option><option value="Almoxarifado">Almoxarifado</option><option value="Expedição">Expedição</option><option value="PCP">PCP</option></select></div>
            <div class="form-group"><label>Data de Conclusão <span>*</span></label><input type="date" id="dataConclusao" name="dataConclusao" required></div>
            <div class="form-group full-width"><label>Nome Cliente <span>*</span></label><input type="text" id="nomeCliente" name="nomeCliente" placeholder="Nome do cliente" required></div>
            <div class="form-group"><label>Número Pedido <span>*</span></label><input type="number" id="numeroPedido" name="numeroPedido" placeholder="Nº do pedido" required></div>
            <div class="form-group"><label>Peso Líq. (kg) <span>*</span></label><input type="text" id="pesoLiquido" name="pesoLiquido" placeholder="Ex: 1500,50" required></div>
            <div class="form-group"><label>Localidade <span>*</span></label><input type="text" id="localidade" name="localidade" placeholder="Cidade/Estado" required></div>
            <div class="form-group"><label>Cor Interna <span>*</span></label><select id="corInterna" name="corInterna" required><option value="" disabled selected>Escolha a cor...</option><option value="AZUL 40360 EXR 53390">AZUL 40360 EXR 53390</option><option value="AZUL MUNSELL 3.30PB2.86/3.23">AZUL MUNSELL 3.30PB2.86/3.23</option><option value="AZUL MUNSELL 5B7/4">AZUL MUNSELL 5B7/4</option><option value="AZUL MUNSELL 6.35B6.99/4.98">AZUL MUNSELL 6.35B6.99/4.98</option><option value="AZUL RAL 5000">AZUL RAL 5000</option><option value="AZUL RAL 5009">AZUL RAL 5009</option><option value="AZUL RAL 5017">AZUL RAL 5017</option><option value="AZUL RAL 5019">AZUL RAL 5019</option><option value="AZUL SATAKE">AZUL SATAKE</option><option value="AZUL WEG 40517BR">AZUL WEG 40517BR</option><option value="BEGE MUNSELL 2.5Y6/2">BEGE MUNSELL 2.5Y6/2</option><option value="BEGE MUNSELL 5Y6/2">BEGE MUNSELL 5Y6/2</option><option value="BEGE MUNSELL 7.5Y8/2">BEGE MUNSELL 7.5Y8/2</option><option value="BEGE RAL 1001">BEGE RAL 1001</option><option value="BEGE RAL 1014">BEGE RAL 1014</option><option value="BRANCO RAL 9016">BRANCO RAL 9016</option><option value="BRANCO CALIFORNIA RAL 1013">BRANCO CALIFORNIA RAL 1013</option><option value="CINZA EXECUTIVO RAL 7021">CINZA EXECUTIVO RAL 7021</option><option value="CINZA RAL 7022">CINZA RAL 7022</option><option value="CINZA RAL 7035">CINZA RAL 7035</option><option value="CINZA RAL 7038">CINZA RAL 7038</option><option value="CINZA RAL 7039">CINZA RAL 7039</option><option value="LARANJA MUNSELL 2.5YR6/14">LARANJA MUNSELL 2.5YR6/14</option><option value="PRATA RAL 9006">PRATA RAL 9006</option><option value="PRETO RAL 9005 S/B">PRETO RAL 9005 S/B</option><option value="PRETO RAL 9017">PRETO RAL 9017</option><option value="VERDE EXR 53390">VERDE EXR 53390</option><option value="VERDE RAL 6002">VERDE RAL 6002</option><option value="VERDE RAL 6018">VERDE RAL 6018</option><option value="VERDE RAL 6027">VERDE RAL 6027</option><option value="VERMELHO RAL 3020">VERMELHO RAL 3020</option></select></div>
            <div class="form-group"><label>Almox <span>*</span></label><input type="text" id="almox" name="almox" placeholder="Identificação do Almox" required></div>
            <div class="form-group full-width"><label>Código Item - Quantidade <span>*</span></label><input type="text" id="codigoQuantidade" name="codigoQuantidade" placeholder="Ex: Item XXXXX - 10UN" required></div>
            <div class="form-group full-width"><label>Motivo da Comunicação Interna <span>*</span></label><input type="text" id="motivo" name="motivo" placeholder="Motivo resumido" required></div>
            <div class="form-group full-width"><label>Observações</label><textarea id="observacoes" name="observacoes" rows="3" placeholder="Informações adicionais (opcional)"></textarea></div>

            <!-- Novo campo de Upload -->
            <div class="form-group full-width">
                <label>Anexar Arquivos (Arraste ou selecione múltiplos)</label>
                <div id="drop-zone" style="border: 2px dashed #10543A; padding: 20px; text-align: center; background-color: #f9f9f9; border-radius: 5px;">
                    <input type="file" id="arquivoAnexo" name="arquivos[]" multiple style="width: 100%;">
                </div>
            </div>
        </div>
        <button type="submit" id="btnEnviar" class="btn-submit full-width">Enviar Comunicação Interna</button>
    </form>
</div>

<script>
    //const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzb0vX5Le_r_r6Jzfixfq5nY9M9EstzQrVBfujvjGSgQW_nl4Muct8HJnMghMlrwian/exec";
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyjMIMb8qC4ftq-hLHnPzMtP4ToMbOXlLxbRq0Sbp60Wskxh3EE57JgvYGu4eK-ZSLm/exec";

    // Função para converter arquivos em Base64
    async function filesToBase64(inputElement) {
        const files = inputElement.files;
        let filesData = [];
        for (let file of files) {
            const base64 = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.readAsDataURL(file);
            });
            filesData.push({ name: file.name, data: base64, type: file.type });
        }
        return filesData;
    }

    document.getElementById('ciForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const btnSubmit = document.getElementById('btnEnviar');
        btnSubmit.innerText = "Processando arquivos e enviando...";
        
        // Coleta os arquivos
        const arquivos = await filesToBase64(document.getElementById('arquivoAnexo'));
        
        const formData = {
            numeroCI: document.getElementById('numeroCI').value,
            // ... (restante dos campos)
            acao: document.getElementById('acao').value,
            responsavel: document.getElementById('responsavel').value,
            destino: document.getElementById('destino').value,
            codigoQuantidade: document.getElementById('codigoQuantidade').value,
            nomeCliente: document.getElementById('nomeCliente').value,
            numeroPedido: document.getElementById('numeroPedido').value,
            localidade: document.getElementById('localidade').value,
            corInterna: document.getElementById('corInterna').value,
            pesoLiquido: document.getElementById('pesoLiquido').value.replace(',', '.'),
            almox: document.getElementById('almox').value,
            motivo: document.getElementById('motivo').value,
            observacoes: document.getElementById('observacoes').value,
            dataConclusao: document.getElementById('dataConclusao').value,
            arquivos: arquivos // Passando o array de arquivos
        };
        
        try {
            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
                body: JSON.stringify(formData)
            });
            const resultado = await response.json();
            if (resultado.success) {
                alert("CI enviada com sucesso!");
                document.getElementById('ciForm').reset();
            } else { alert("Erro: " + resultado.error); }
        } catch (error) { alert("Erro ao enviar."); }
        finally { btnSubmit.innerText = "Enviar Comunicação Interna"; }
    });
    
    // ... manter sua função gerarNumero() existente ...
    async function gerarNumero() {
    const btnGerar = document.getElementById('btnGerar');
    const inputNumero = document.getElementById('numeroCI');

    btnGerar.disabled = true;
    btnGerar.innerText = "Gerando...";

    try {
        const response = await fetch(WEB_APP_URL + "?action=getSequence");
        const resultado = await response.json();

        if (resultado.numero) {
            inputNumero.value = resultado.numero;
        } else {
            alert("Não foi possível gerar o número. Tente novamente.");
        }
    } catch (error) {
        console.error(error);
        alert("Erro ao gerar número. Verifique sua conexão.");
    } finally {
        btnGerar.disabled = false;
        btnGerar.innerText = "Gerar Número CI";
    }
}
</script>
</body>
</html>
