<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunicação Interna - Grupo SR</title>
    <!-- Fontes institucionais do Manual de Marca:
         Azonix  -> substituída por Orbitron (indisponível em web font livre)
         Russo One -> fonte oficial, disponível no Google Fonts
         Accura  -> substituída por Montserrat (indisponível em web font livre) -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Russo+One&family=Montserrat:ital,wght@0,300;0,400;0,600;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Cor principal - Manual de Marca (HEX #1D543A / PANTONE 7484 CP) */
            --sr-primary: #1D543A;
            --sr-primary-dark: #123825;
            /* Paleta de apoio - Manual de Marca */
            --sr-accent: #00B046;   /* PANTONE 7481 CP */
            --sr-lime: #7DC817;     /* PANTONE 2421 CP */
            --sr-mint: #5BBA6F;     /* PANTONE 2249 CP */

            --sr-ink: #1c211f;
            --sr-paper: #f2f5f3;
            --sr-line: #d7ded9;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--sr-paper);
            background-image:
                radial-gradient(circle at 100% 0%, rgba(0,176,70,0.06) 0%, transparent 45%),
                radial-gradient(circle at 0% 100%, rgba(29,84,58,0.05) 0%, transparent 40%);
            margin: 0;
            padding: 48px 20px;
            display: flex;
            justify-content: center;
            color: var(--sr-ink);
        }

        .form-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 650px;
            border-radius: 10px;
            box-shadow: 0 10px 34px rgba(15, 40, 28, 0.12);
            overflow: hidden;
        }

        /* ===== CABEÇALHO ===== */
        .header-banner {
            position: relative;
            background: linear-gradient(135deg, var(--sr-primary) 0%, var(--sr-primary-dark) 100%);
            color: #ffffff;
            padding: 40px 30px 32px;
            text-align: center;
            overflow: hidden;
            isolation: isolate;
        }

        /* Elementos gráficos: facetas angulares inspiradas no logotipo (manual de marca, pág. 11-12) */
        .header-banner::before,
        .header-banner::after {
            content: "";
            position: absolute;
            z-index: -1;
        }
        .header-banner::before {
            width: 220px;
            height: 220px;
            top: -110px;
            right: -70px;
            background: var(--sr-accent);
            opacity: 0.22;
            clip-path: polygon(30% 0%, 100% 0%, 100% 70%, 60% 100%, 0% 100%);
        }
        .header-banner::after {
            width: 140px;
            height: 140px;
            bottom: -70px;
            left: -40px;
            background: var(--sr-lime);
            opacity: 0.18;
            clip-path: polygon(0% 0%, 60% 0%, 100% 40%, 100% 100%, 20% 100%);
        }

        .header-banner h1 {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 26px;
            letter-spacing: 7px;
        }
        .header-banner p {
            margin: 10px 0 0 0;
            font-family: 'Russo One', sans-serif;
            font-size: 15px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.92;
        }

        /* Faixa de assinatura com as 3 cores de apoio, representando as divisões do Grupo SR */
        .brand-stripe {
            height: 5px;
            width: 100%;
            background: linear-gradient(90deg, var(--sr-accent) 0%, var(--sr-mint) 50%, var(--sr-lime) 100%);
        }

        .form-body {
            padding: 36px 35px 30px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--sr-ink);
            font-size: 13.5px;
            letter-spacing: 0.2px;
        }
        label span {
            color: #de350b;
            margin-left: 3px;
        }

        input[type="text"], input[type="number"], input[type="date"], select, textarea, input[type="file"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--sr-line);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            font-family: 'Montserrat', sans-serif;
            background-color: #fafbfa;
            color: var(--sr-ink);
            transition: all 0.2s;
        }
        input[type="file"] {
            padding: 8px 10px;
            background-color: #ffffff;
            cursor: pointer;
        }
        input[type="text"]:focus, input[type="number"]:focus, input[type="date"]:focus,
        select:focus, textarea:focus, input[type="file"]:focus {
            border-color: var(--sr-primary);
            outline: none;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(0, 176, 70, 0.15);
        }

        .number-generator-group {
            display: flex;
            gap: 12px;
        }
        .number-generator-group input {
            flex: 1;
            background-color: #eef4f0;
            font-weight: 700;
            color: var(--sr-primary);
            letter-spacing: 1px;
        }
        .btn-generator {
            background-color: var(--sr-primary);
            color: white;
            border: none;
            padding: 0 22px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.3px;
            transition: background-color 0.2s;
            white-space: nowrap;
        }
        .btn-generator:hover {
            background-color: var(--sr-primary-dark);
        }

        .btn-submit {
            background-color: var(--sr-accent);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Russo One', sans-serif;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: background-color 0.2s;
            margin-top: 15px;
        }
        .btn-submit:hover {
            background-color: var(--sr-primary);
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        .info-required {
            font-size: 12px;
            color: #6b756f;
            margin-bottom: 20px;
            text-align: right;
        }

        .form-footer {
            text-align: center;
            padding: 16px 20px 22px;
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            letter-spacing: 0.5px;
            color: #8b948e;
            border-top: 1px solid var(--sr-line);
        }
        .form-footer strong {
            color: var(--sr-primary);
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header-banner">
        <h1>G R U P O &nbsp; S R</h1>
        <p>Comunicação Interna</p>
    </div>
    <div class="brand-stripe"></div>

    <form id="ciForm" class="form-body">
        <div class="info-required">Campos marcados com <span>*</span> são obrigatórios.</div>

        <!-- 1. Número Sequencial -->
        <div class="form-group">
            <label>Nº Comunicação Interna <span>*</span></label>
            <div class="number-generator-group">
                <input type="text" id="numeroCI" name="numeroCI" placeholder="Clique ao lado para gerar" readonly required>
                <button type="button" id="btnGerar" class="btn-generator" onclick="gerarNumero()">Gerar Número CI</button>
            </div>
        </div>

        <!-- 2. Ação da Comunicação Interna -->
        <div class="form-group">
            <label>Ação da Comunicação Interna <span>*</span></label>
            <select id="acao" name="acao" required>
                <option value="" disabled selected>Escolha...</option>
                <option value="Fabricação">Fabricação</option>
                <option value="Requisição">Requisição</option>
                <option value="Pintura">Pintura</option>
            </select>
        </div>

        <!-- 3. Responsável CI -->
        <div class="form-group">
            <label>Responsável CI <span>*</span></label>
            <select id="responsavel" name="responsavel" required>
                <option value="" disabled selected>Escolha...</option>
                <option value="Fernando Hendges Lopes">Fernando Hendges Lopes</option>
                <option value="Marcos Malezan Tasquetto">Marcos Malezan Tasquetto</option>
                <option value="Raphael Naeher">Raphael Naeher</option>
                <option value="Ricardo Moreira">Ricardo Moreira</option>
                <option value="Alan Renato Virago">Alan Renato Virago</option>
                <option value="José Tomas">José Tomas</option>
                <option value="Luis Filipe">Luis Filipe</option>
                <option value="Eduardo Prado">Eduardo Prado</option>
                <option value="Enrique Carvalho">Enrique Carvalho</option>
                <option value="Henrique Moreira">Henrique Moreira</option>
                <option value="Rafael Fagan">Rafael Fagan</option>
            </select>
        </div>

        <!-- 4. Destino da Comunicação -->
        <div class="form-group">
            <label>Destino da Comunicação <span>*</span></label>
            <select id="destino" name="destino" required>
                <option value="" disabled selected>Escolha...</option>
                <option value="Almoxarifado">Almoxarifado</option>
                <option value="Expedição">Expedição</option>
                <option value="PCP">PCP</option>
            </select>
        </div>

        <!-- 5. Código Item - Quantidade -->
        <div class="form-group">
            <label>Código Item - Quantidade <span>*</span></label>
            <input type="text" id="codigoQuantidade" name="codigoQuantidade" placeholder="Digite a sua resposta" required>
        </div>

        <!-- 6. Nome Cliente -->
        <div class="form-group">
            <label>Nome Cliente <span>*</span></label>
            <input type="text" id="nomeCliente" name="nomeCliente" placeholder="Digite a sua resposta" required>
        </div>

        <!-- 7. Número Pedido -->
        <div class="form-group">
            <label>Número Pedido <span>*</span></label>
            <input type="number" id="numeroPedido" name="numeroPedido" placeholder="Digite um número" required>
        </div>

        <!-- 8. Localidade -->
        <div class="form-group">
            <label>Localidade <span>*</span></label>
            <input type="text" id="localidade" name="localidade" placeholder="Digite a sua resposta" required>
        </div>

        <!-- 9. Peso Líq. -->
        <div class="form-group">
            <label>Peso Líq. <span>*</span></label>
            <input type="number" step="0.01" id="pesoLiquido" name="pesoLiquido" placeholder="Digite um número" required>
        </div>

        <!-- 10. Almox -->
        <div class="form-group">
            <label>Almox <span>*</span></label>
            <input type="text" id="almox" name="almox" placeholder="Digite a sua resposta" required>
        </div>

        <!-- 11. Cor Interna -->
        <div class="form-group">
            <label>Cor Interna <span>*</span></label>
            <select id="corInterna" name="corInterna" required>
                <option value="" disabled selected>Escolha...</option>
                <option value="AZUL 40360 EXR 53390">AZUL 40360 EXR 53390</option>
                <option value="AZUL MUNSELL 3.30PB2.86/3.23">AZUL MUNSELL 3.30PB2.86/3.23</option>
                <option value="AZUL MUNSELL 5B7/4">AZUL MUNSELL 5B7/4</option>
                <option value="AZUL MUNSELL 6.35B6.99/4.98">AZUL MUNSELL 6.35B6.99/4.98</option>
                <option value="AZUL RAL 5000">AZUL RAL 5000</option>
                <option value="AZUL RAL 5009">AZUL RAL 5009</option>
                <option value="AZUL RAL 5017">AZUL RAL 5017</option>
                <option value="AZUL RAL 5019">AZUL RAL 5019</option>
                <option value="AZUL SATAKE">AZUL SATAKE</option>
                <option value="AZUL WEG 40517BR">AZUL WEG 40517BR</option>
                <option value="BEGE MUNSELL 2.5Y6/2">BEGE MUNSELL 2.5Y6/2</option>
                <option value="BEGE MUNSELL 5Y6/2">BEGE MUNSELL 5Y6/2</option>
                <option value="BEGE MUNSELL 7.5Y8/2">BEGE MUNSELL 7.5Y8/2</option>
                <option value="BEGE RAL 1001">BEGE RAL 1001</option>
                <option value="BEGE RAL 1014">BEGE RAL 1014</option>
                <option value="BRANCO RAL 9016">BRANCO RAL 9016</option>
                <option value="BRANCO CALIFORNIA RAL 1013">BRANCO CALIFORNIA RAL 1013</option>
                <option value="CINZA EXECUTIVO RAL 7021">CINZA EXECUTIVO RAL 7021</option>
                <option value="CINZA RAL 7022">CINZA RAL 7022</option>
                <option value="CINZA RAL 7035">CINZA RAL 7035</option>
                <option value="CINZA RAL 7038">CINZA RAL 7038</option>
                <option value="CINZA RAL 7039">CINZA RAL 7039</option>
                <option value="LARANJA MUNSELL 2.5YR6/14">LARANJA MUNSELL 2.5YR6/14</option>
                <option value="PRATA RAL 9006">PRATA RAL 9006</option>
                <option value="PRETO RAL 9005 S/B">PRETO RAL 9005 S/B</option>
                <option value="PRETO RAL 9017">PRETO RAL 9017</option>
                <option value="VERDE EXR 53390">VERDE EXR 53390</option>
                <option value="VERDE RAL 6002">VERDE RAL 6002</option>
                <option value="VERDE RAL 6018">VERDE RAL 6018</option>
                <option value="VERDE RAL 6027">VERDE RAL 6027</option>
                <option value="VERMELHO RAL 3020">VERMELHO RAL 3020</option>
            </select>
        </div>

        <!-- 12. Data de Conclusão -->
        <div class="form-group">
            <label>Data de Conclusão <span>*</span></label>
            <input type="date" id="dataConclusao" name="dataConclusao" required>
        </div>

        <!-- 13. Motivo da Comunicação Interna -->
        <div class="form-group">
            <label>Motivo da Comunicação Interna <span>*</span></label>
            <input type="text" id="motivo" name="motivo" placeholder="Digite a sua resposta" required>
        </div>

        <!-- 14. Observações -->
        <div class="form-group">
            <label>Observações</label>
            <textarea id="observacoes" name="observacoes" rows="4" placeholder="Digite a sua resposta (opcional)"></textarea>
        </div>

        <!-- 15. Campo de Anexo -->
        <div class="form-group">
            <label>Anexar Arquivo (PDF, Desenhos, Imagens)</label>
            <input type="file" id="arquivoAnexo" name="arquivoAnexo" accept=".pdf,image/*,.doc,.docx,.xls,.xlsx">
        </div>

        <button type="submit" id="btnEnviar" class="btn-submit">Enviar Comunicação Interna</button>
    </form>

    <div class="form-footer"><strong>GRUPO SR</strong> · Equipamentos · Elevadores · Service</div>
</div>

<script>
    // URL OFICIAL DO SEU GOOGLE APPS SCRIPT WEB APP
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzb0vX5Le_r_r6Jzfixfq5nY9M9EstzQrVBfujvjGSgQW_nl4Muct8HJnMghMlrwian/exec";

    async function gerarNumero() {
        const btn = document.getElementById('btnGerar');
        const inputNum = document.getElementById('numeroCI');
        
        btn.innerText = "Gerando...";
        btn.classList.add('loading');

        try {
            const response = await fetch(`${WEB_APP_URL}?action=getSequence`);
            const data = await response.json();
            
            if(data && data.numero) {
                inputNum.value = data.numero;
                btn.innerText = "Gerado!";
                btn.style.backgroundColor = "#00B046";
                btn.disabled = true;
            } else {
                alert("Erro ao obter o número sequencial.");
                btn.innerText = "Gerar Número CI";
                btn.classList.remove('loading');
            }
        } catch (error) {
            console.error(error);
            alert("Erro de conexão com o gerador.");
            btn.innerText = "Gerar Número CI";
            btn.classList.remove('loading');
        }
    }

    document.getElementById('ciForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const numCI = document.getElementById('numeroCI').value;
        if(!numCI) {
            alert("Por favor, gere o número da CI antes de enviar.");
            return;
        }

        const btnSubmit = document.getElementById('btnEnviar');
        btnSubmit.innerText = "Enviando para o Asana...";
        btnSubmit.classList.add('loading');

        const fileInput = document.getElementById('arquivoAnexo');
        let arquivoBase64 = null;
        let arquivoName = null;
        let arquivoType = null;

        // Se houver arquivo anexado, converte nativamente para as variáveis isoladas que o Script espera
        if (fileInput.files.length > 0) {
            const file = fileInput.files[0];
            const arquivoData = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve({
                    base64: reader.result.split(',')[1],
                    name: file.name,
                    type: file.type
                });
                reader.readAsDataURL(file);
            });
            arquivoBase64 = arquivoData.base64;
            arquivoName = arquivoData.name;
            arquivoType = arquivoData.type;
        }

        // Estrutura perfeitamente alinhada com as propriedades lidas no Código.gs
        const formData = {
            numeroCI: numCI,
            acao: document.getElementById('acao').value,
            responsavel: document.getElementById('responsavel').value,
            destino: document.getElementById('destino').value,
            codigoQuantidade: document.getElementById('codigoQuantidade').value,
            nomeCliente: document.getElementById('nomeCliente').value,
            numeroPedido: document.getElementById('numeroPedido').value,
            localidade: document.getElementById('localidade').value,
            pesoLiquido: document.getElementById('pesoLiquido').value,
            almox: document.getElementById('almox').value,
            corInterna: document.getElementById('corInterna').value,
            dataConclusao: document.getElementById('dataConclusao').value,
            motivo: document.getElementById('motivo').value,
            observacoes: document.getElementById('observacoes').value,
            fileData: arquivoBase64,
            fileName: arquivoName,
            fileType: arquivoType
        };

        try {
            // CORREÇÃO: Enviando em modo padrão com cabeçalho text/plain para evitar bloqueios do CORS no Apps Script
            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
                body: JSON.stringify(formData)
            });

            const resultado = await response.json();

            if (resultado.success) {
                alert("Comunicação Interna " + resultado.numeroGerado + " enviada com sucesso e cadastrada no Asana!");
                document.getElementById('ciForm').reset();
                
                // Restaura o botão de gerar número sequencial
                const btnGerar = document.getElementById('btnGerar');
                btnGerar.innerText = "Gerar Número CI";
                btnGerar.style.backgroundColor = "#1D543A";
                btnGerar.disabled = false;
            } else {
                alert("Erro reportado pelo servidor: " + resultado.error);
            }

        } catch (error) {
            console.error(error);
            alert("Erro ao enviar os dados para o servidor. Verifique o console ou a conexão.");
        } finally {
            btnSubmit.innerText = "Enviar Comunicação Interna";
            btnSubmit.classList.remove('loading');
        }
    });
</script>
</body>
</html>
